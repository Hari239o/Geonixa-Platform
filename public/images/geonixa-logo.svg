<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200" fill="none" role="img" aria-label="Geonixa Logo">
  <title>Geonixa</title>
  
  <!-- 4 DIAGONAL CONVERGING ARROWS -->
  <g transform="translate(100,100)" stroke-linecap="round" stroke-linejoin="round">
    <!-- TL gray -->
    <line x1="-50" y1="-50" x2="-20" y2="-20" stroke="#5A5C5E" stroke-width="16"/>
    <polyline points="-20,-45 -20,-20 -45,-20" stroke="#5A5C5E" stroke-width="16" fill="none"/>
    <!-- TR gray -->
    <line x1="50" y1="-50" x2="20" y2="-20" stroke="#5A5C5E" stroke-width="16"/>
    <polyline points="45,-20 20,-20 20,-45" stroke="#5A5C5E" stroke-width="16" fill="none"/>
    <!-- BR gray -->
    <line x1="50" y1="50" x2="20" y2="20" stroke="#5A5C5E" stroke-width="16"/>
    <polyline points="45,20 20,20 20,45" stroke="#5A5C5E" stroke-width="16" fill="none"/>
    <!-- BL ORANGE -->
    <line x1="-50" y1="50" x2="-20" y2="20" stroke="#FF5A1F" stroke-width="16"/>
    <polyline points="-20,45 -20,20 -45,20" stroke="#FF5A1F" stroke-width="16" fill="none"/>
  </g>

  <!-- DIVIDER -->
  <rect x="200" y="55" width="4" height="90" rx="2" fill="#C5C7CB" />

  <!-- WORDMARK G E O N I X A -->
  <g transform="translate(250,100)" stroke="#FF5A1F" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- G -->
    <path d="M 40,-15 C 40,-45 20,-52 0,-52 C -25,-52 -45,-32 -45,0 C -45,32 -25,52 0,52 C 25,52 45,35 45,15 L 45,0 L 15,0"/>

    <!-- E -->
    <g transform="translate(105,0)">
      <line x1="-28" y1="-52" x2="-28" y2="52"/>
      <line x1="-28" y1="-52" x2="28"  y2="-52"/>
      <line x1="-28" y1="0"   x2="15"  y2="0"/>
      <line x1="-28" y1="52"  x2="28"  y2="52"/>
    </g>

    <!-- O -->
    <g transform="translate(210,0)">
      <circle cx="0" cy="0" r="52"/>
    </g>

    <!-- N -->
    <g transform="translate(320,0)">
      <line x1="-28" y1="52"  x2="-28" y2="-52"/>
      <line x1="-28" y1="-52" x2="28"  y2="52"/>
      <line x1="28"  y1="52"  x2="28"  y2="-52"/>
    </g>

    <!-- I -->
    <g transform="translate(400,0)">
      <line x1="0" y1="-52" x2="0" y2="52"/>
    </g>

    <!-- X -->
    <g transform="translate(470,0)">
      <line x1="-28" y1="-52" x2="-8" y2="-15"/>
      <line x1="28" y1="52" x2="8" y2="15"/>
      <line x1="28" y1="-52" x2="8" y2="-15"/>
      <line x1="-28" y1="52" x2="-8" y2="15"/>
    </g>

    <!-- A -->
    <g transform="translate(560,0)">
      <line x1="-30" y1="52"  x2="0"  y2="-52"/>
      <line x1="0"   y1="-52" x2="30" y2="52"/>
    </g>
  </g>
</svg>
