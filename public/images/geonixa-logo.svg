<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" fill="none" role="img" aria-label="Geonixa Logo">
  <title>Geonixa</title>
  <desc>Geonixa — enterprise assessment platform</desc>

  <!-- 4 DIAGONAL CONVERGING ARROWS  (centre 100,100) -->
  <g transform="translate(100,100)" stroke-linecap="round" stroke-linejoin="round">
    <!-- TL gray -->
    <line x1="-60" y1="-60" x2="-18" y2="-18" stroke="#6B7280" stroke-width="12"/>
    <polyline points="-18,-36 -18,-18 -36,-18" stroke="#6B7280" stroke-width="12" fill="none"/>
    <!-- TR gray -->
    <line x1="60" y1="-60" x2="18" y2="-18" stroke="#6B7280" stroke-width="12"/>
    <polyline points="36,-18 18,-18 18,-36" stroke="#6B7280" stroke-width="12" fill="none"/>
    <!-- BR gray -->
    <line x1="60" y1="60" x2="18" y2="18" stroke="#6B7280" stroke-width="12"/>
    <polyline points="36,18 18,18 18,36" stroke="#6B7280" stroke-width="12" fill="none"/>
    <!-- BL ORANGE signature -->
    <line x1="-60" y1="60" x2="-18" y2="18" stroke="#FF6B00" stroke-width="14"/>
    <polyline points="-18,36 -18,18 -36,18" stroke="#FF6B00" stroke-width="14" fill="none"/>
  </g>

  <!-- DIVIDER -->
  <rect x="210" y="46" width="3" height="108" rx="1.5" fill="#9CA3AF" opacity="0.4"/>

  <!-- WORDMARK  G E O N I X A
       Group origin: translate(240,100)
       Letter offsets: Adjusted for premium spacing
  -->
  <g transform="translate(240,100)" stroke="#FF6B00" stroke-width="13.5"
     stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- G: Pro MNC Letterform with proper stem and crossbar -->
    <path d="M 38,-15 C 38,-38 22,-48 0,-48 C -22,-48 -40,-30 -40,0 C -40,30 -22,48 0,48 C 22,48 38,38 38,15 L 38,0 L 12,0"/>

    <!-- E -->
    <g transform="translate(98,0)">
      <line x1="-28" y1="-46" x2="-28" y2="46"/>
      <line x1="-28" y1="-46" x2="28"  y2="-46"/>
      <line x1="-28" y1="0"   x2="22"  y2="0"/>
      <line x1="-28" y1="46"  x2="28"  y2="46"/>
    </g>

    <!-- O -->
    <g transform="translate(196,0)">
      <ellipse cx="0" cy="0" rx="38" ry="48"/>
    </g>

    <!-- N -->
    <g transform="translate(296,0)">
      <line x1="-25" y1="46"  x2="-25" y2="-46"/>
      <line x1="-25" y1="-46" x2="25"  y2="46"/>
      <line x1="25"  y1="46"  x2="25"  y2="-46"/>
    </g>

    <!-- I -->
    <g transform="translate(378,0)">
      <line x1="0" y1="-46" x2="0" y2="46"/>
    </g>

    <!-- X -->
    <g transform="translate(450,0)">
      <line x1="-25" y1="-46" x2="25" y2="46"/>
      <line x1="25"  y1="-46" x2="-25" y2="46"/>
    </g>

    <!-- A: Clean & Symmetrical -->
    <g transform="translate(534,0)">
      <line x1="-28" y1="46"  x2="0"  y2="-48"/>
      <line x1="0"   y1="-48" x2="28" y2="46"/>
      <line x1="-16" y1="12"  x2="16" y2="12"/>
    </g>

  </g>
</svg>
